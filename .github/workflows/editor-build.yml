name: Editor Build

# Triggered by the Release workflow after a tag is pushed,
# or manually for testing builds without a release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string to embed (e.g. 1.2.3)'
        required: false
        default: '0.0.0-dev'

jobs:
  build:
    name: Build Editor — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: editor

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon — produces .dmg
            platform: macos
            artifact: '*.dmg'
          - os: ubuntu-latest   # Linux — produces .AppImage
            platform: linux
            artifact: '*.AppImage'
          - os: windows-latest  # Windows — produces NSIS installer
            platform: windows
            artifact: '*.exe'

    steps:
      - uses: actions/checkout@v4

      # ── PHP ──────────────────────────────────────────────────────────────────
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, mbstring, dom, xml, pdo, sqlite3, pdo_sqlite, zip
          coverage: none

      # ── Node ─────────────────────────────────────────────────────────────────
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: editor/package-lock.json

      # ── Linux system deps for Electron ───────────────────────────────────────
      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.0-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            libxss1 libgconf-2-4

      # ── Determine version ────────────────────────────────────────────────────
      - name: Set version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      # ── .env ─────────────────────────────────────────────────────────────────
      - name: Create .env
        shell: bash
        run: |
          cp .env.example .env
          # Patch version and IDs from tag / input
          sed -i.bak "s/^NATIVEPHP_APP_VERSION=.*/NATIVEPHP_APP_VERSION=${{ steps.ver.outputs.version }}/" .env
          sed -i.bak "s/^APP_KEY=.*//" .env  # key:generate fills this
          # Disable updater for builds unless secrets are set
          sed -i.bak "s/^NATIVEPHP_UPDATER_ENABLED=.*/NATIVEPHP_UPDATER_ENABLED=false/" .env
          rm -f .env.bak

      # ── Composer ─────────────────────────────────────────────────────────────
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-dev --optimize-autoloader --ignore-platform-reqs

      - name: Generate app key
        run: php artisan key:generate --force

      - name: Run migrations
        run: php artisan migrate --force --graceful

      # ── npm + Vite ────────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # ── NativePHP build ───────────────────────────────────────────────────────
      - name: Build NativePHP app
        env:
          # macOS code signing (optional — skip if secrets not set)
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: php artisan native:build --no-interaction

      # ── Collect artifacts ─────────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: phpolygon-editor-${{ matrix.platform }}-v${{ steps.ver.outputs.version }}
          path: |
            dist/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 30

  # ── Attach artifacts to GitHub Release (only on tag push) ──────────────────
  attach-to-release:
    name: Attach to GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          fail_on_unmatched_files: false
