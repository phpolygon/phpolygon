name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  tests:
    name: PHP ${{ matrix.php }} — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.5'
            os: ubuntu-latest
          - php: '8.5'
            os: macos-14

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, mbstring, dom, xml
          coverage: none
          tools: pie

      # Best-effort: build the native Metal extension so the macOS leg exercises
      # the native-Metal pixel VRT (MetalRenderToImageTest). If it fails to
      # build, the test skips via its #[RequiresPhpExtension('metal')] guard and
      # the job stays green — hence continue-on-error.
      - name: Install php-metal-gpu (macOS, best-effort)
        if: runner.os == 'macOS'
        continue-on-error: true
        run: pie install hmennen90/php-metal-gpu:@dev

      - name: Install Composer dependencies
        run: composer install --no-interaction --ignore-platform-reqs

      - name: Run PHPUnit (exclude font VRT)
        run: vendor/bin/phpunit --exclude-group font-vrt

  tests-gpu:
    name: PHP ${{ matrix.php }} — GPU (xvfb)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.5']

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, mbstring, dom, xml
          coverage: none

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libglfw3-dev xvfb \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Build php-glfw
        run: |
          git clone https://github.com/mario-deluna/php-glfw
          cd php-glfw
          sudo phpize
          ./configure --enable-glfw
          make -j"$(nproc)"
          sudo make install
          cd ..
          echo 'extension=glfw.so' | sudo tee -a "$(php -r 'echo php_ini_loaded_file();')"

      - name: Install Composer dependencies
        run: composer install --no-interaction --ignore-platform-reqs

      - name: Run PHPUnit with GPU (exclude font VRT)
        run: xvfb-run --auto-servernum vendor/bin/phpunit --exclude-group font-vrt

  gl-matrix:
    name: OpenGL version matrix (Mesa 3.0-4.6)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: gd, mbstring, dom, xml
          coverage: none

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libglfw3-dev xvfb xauth \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dri mesa-utils

      - name: Build php-glfw
        run: |
          git clone https://github.com/mario-deluna/php-glfw
          cd php-glfw
          sudo phpize
          ./configure --enable-glfw
          make -j"$(nproc)"
          sudo make install
          cd ..
          echo 'extension=glfw.so' | sudo tee -a "$(php -r 'echo php_ini_loaded_file();')"

      - name: Install Composer dependencies
        run: composer install --no-interaction --ignore-platform-reqs

      - name: Run OpenGL version matrix (forced GL 3.0/3.1/3.3/4.1/4.6 via Mesa)
        env:
          LIBGL_ALWAYS_SOFTWARE: '1'
          GALLIUM_DRIVER: llvmpipe
        run: sh .docker/gl-matrix.sh

  shaders:
    name: Shader validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring
          coverage: none

      - name: Install glslang (for advisory pass)
        run: sudo apt-get update && sudo apt-get install -y glslang-tools

      - name: Validate shaders
        run: php scripts/validate-shaders.php

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: gd, mbstring, dom, xml
          coverage: none

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libglfw3-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Build php-glfw
        run: |
          git clone https://github.com/mario-deluna/php-glfw
          cd php-glfw
          sudo phpize
          ./configure --enable-glfw
          make -j"$(nproc)"
          sudo make install
          cd ..
          echo 'extension=glfw.so' | sudo tee -a "$(php -r 'echo php_ini_loaded_file();')"

      - name: Install Composer dependencies
        run: composer install --no-interaction --ignore-platform-reqs

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --error-format=github

  vrt:
    name: VRT (Alpine edge)
    runs-on: ubuntu-latest
    container:
      image: alpine:edge

    steps:
      - name: Install PHP and dependencies
        run: |
          apk add --no-cache \
            php85 php85-gd php85-mbstring php85-phar php85-dom \
            php85-xml php85-xmlwriter php85-tokenizer php85-openssl \
            php85-ctype \
            freetype libpng libjpeg-turbo \
            git unzip
          # php85 in alpine:edge now ships /usr/bin/php itself; only symlink
          # if it is missing, and force-overwrite so the step is idempotent.
          if [ ! -e /usr/bin/php ]; then ln -sf /usr/bin/php85 /usr/bin/php; fi
          php -v

      - uses: actions/checkout@v5

      - name: Install Composer
        run: |
          php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
          php composer-setup.php --install-dir=/usr/local/bin --filename=composer
          rm composer-setup.php

      - name: Install dependencies
        run: composer install --no-interaction --ignore-platform-reqs

      - name: Run all VRT tests (including fonts)
        run: vendor/bin/phpunit tests/Testing/

      - name: Check for uncommitted snapshot changes
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          changed=$(git diff --name-only tests/ || true)
          new=$(git ls-files --others --exclude-standard tests/ || true)
          if [ -n "$changed" ] || [ -n "$new" ]; then
            echo "::error::VRT snapshots are out of date. Regenerate in the Alpine container and commit."
            echo ""
            echo "Changed files:"
            echo "$changed"
            echo "$new"
            echo ""
            echo "To regenerate locally:"
            echo "  docker build -f .docker/vrt.Dockerfile -t phpolygon-vrt ."
            echo "  docker run --rm -v \$(pwd):/app -w /app phpolygon-vrt \\"
            echo "    sh -c 'composer install --ignore-platform-reqs && PHPOLYGON_UPDATE_SNAPSHOTS=1 vendor/bin/phpunit tests/Testing/'"
            exit 1
          fi
