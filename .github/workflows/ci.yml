name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  tests:
    name: PHP ${{ matrix.php }} — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            os: ubuntu-latest
          - php: '8.3'
            os: ubuntu-latest
          - php: '8.4'
            os: ubuntu-latest
          - php: '8.4'
            os: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, mbstring, dom, xml
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --ignore-platform-reqs

      - name: Run PHPUnit (exclude font VRT)
        run: vendor/bin/phpunit --exclude-group font-vrt

  tests-gpu:
    name: PHP ${{ matrix.php }} — GPU (xvfb)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, mbstring, dom, xml
          coverage: none

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            php${{ matrix.php }}-dev \
            build-essential cmake \
            libglfw3-dev xvfb \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Build php-glfw
        run: |
          git clone https://github.com/mario-deluna/php-glfw
          cd php-glfw
          sudo phpize
          ./configure --enable-glfw
          make -j$(nproc)
          sudo make install
          cd ..
          echo 'extension=glfw.so' | sudo tee -a $(php -r "echo php_ini_loaded_file();")

      - name: Install Composer dependencies
        run: composer install --no-interaction --ignore-platform-reqs

      - name: Run PHPUnit with GPU (exclude font VRT)
        run: xvfb-run --auto-servernum vendor/bin/phpunit --exclude-group font-vrt

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gd, mbstring, dom, xml
          coverage: none

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            php8.4-dev \
            build-essential cmake \
            libglfw3-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Build php-glfw
        run: |
          git clone https://github.com/mario-deluna/php-glfw
          cd php-glfw
          sudo phpize
          ./configure --enable-glfw
          make -j$(nproc)
          sudo make install
          cd ..
          echo 'extension=glfw.so' | sudo tee -a $(php -r "echo php_ini_loaded_file();")

      - name: Install Composer dependencies
        run: composer install --no-interaction --ignore-platform-reqs

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --error-format=github

  vrt:
    name: VRT (Alpine 3.22)
    runs-on: ubuntu-latest
    container:
      image: alpine:3.22

    steps:
      - name: Install PHP and dependencies
        run: |
          apk add --no-cache \
            php84 php84-gd php84-mbstring php84-phar php84-dom \
            php84-xml php84-xmlwriter php84-tokenizer php84-openssl \
            php84-ctype \
            freetype libpng libjpeg-turbo \
            git unzip
          ln -s /usr/bin/php84 /usr/bin/php

      - uses: actions/checkout@v4

      - name: Install Composer
        run: |
          php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
          php composer-setup.php --install-dir=/usr/local/bin --filename=composer
          rm composer-setup.php

      - name: Install dependencies
        run: composer install --no-interaction --ignore-platform-reqs

      - name: Run all VRT tests (including fonts)
        run: vendor/bin/phpunit tests/Testing/

      - name: Check for uncommitted snapshot changes
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          changed=$(git diff --name-only tests/ || true)
          new=$(git ls-files --others --exclude-standard tests/ || true)
          if [ -n "$changed" ] || [ -n "$new" ]; then
            echo "::error::VRT snapshots are out of date. Regenerate in the Alpine container and commit."
            echo ""
            echo "Changed files:"
            echo "$changed"
            echo "$new"
            echo ""
            echo "To regenerate locally:"
            echo "  docker build -f .docker/vrt.Dockerfile -t phpolygon-vrt ."
            echo "  docker run --rm -v \$(pwd):/app -w /app phpolygon-vrt \\"
            echo "    sh -c 'composer install --ignore-platform-reqs && PHPOLYGON_UPDATE_SNAPSHOTS=1 vendor/bin/phpunit tests/Testing/'"
            exit 1
          fi
